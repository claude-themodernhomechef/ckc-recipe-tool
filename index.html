<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CKC Review">
<meta name="theme-color" content="#0f0f0d">
<title>CKC Recipe Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f0f0d;--surface:#1a1a16;--border:rgba(255,255,255,0.08);--text-primary:#f5f3ee;--text-secondary:rgba(245,243,238,0.5);--text-muted:rgba(245,243,238,0.25);--green:#7cb87a;--green-glow:rgba(124,184,122,0.15);--red:#c96b6b;--red-glow:rgba(201,107,107,0.15);--yellow:#d4a843;--yellow-glow:rgba(212,168,67,0.15);--font-display:'Cormorant Garamond',Georgia,serif;--font-body:'DM Sans',system-ui,sans-serif}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text-primary);font-family:var(--font-body)}
#app{height:100dvh;width:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}
#login-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;padding:2rem;z-index:200;background:var(--bg)}
.login-logo{font-family:var(--font-display);font-size:2.5rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase}
.login-tagline{font-size:11px;color:var(--text-muted);letter-spacing:.12em;text-transform:uppercase;margin-top:-1rem}
.login-form{display:flex;flex-direction:column;gap:12px;width:100%;max-width:280px}
.login-input{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text-primary);font-family:var(--font-body);font-size:14px;outline:none;transition:border-color .2s}
.login-input:focus{border-color:rgba(255,255,255,0.2)}
.login-input::placeholder{color:var(--text-muted)}
.login-btn{background:var(--text-primary);color:var(--bg);border:none;border-radius:100px;padding:14px;font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;transition:opacity .2s}
.login-btn:active{opacity:.8}
.login-error{font-size:12px;color:var(--red);text-align:center;min-height:16px}
#loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:80;background:var(--bg)}
.loading-text{font-size:12px;color:var(--text-muted);letter-spacing:.08em}
.dots{display:flex;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:pulse 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
#error-screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:2rem;z-index:90;background:var(--bg)}
.error-title{font-family:var(--font-display);font-size:1.5rem;color:var(--red)}
.error-msg{font-size:13px;color:var(--text-secondary);text-align:center;line-height:1.6;max-width:280px}
.error-btn{background:none;border:1px solid var(--border);border-radius:100px;padding:10px 24px;color:var(--text-secondary);font-family:var(--font-body);font-size:13px;cursor:pointer}
#header{display:none;padding:16px 20px 12px;flex-shrink:0;position:relative}
#header.visible{display:flex;align-items:center;justify-content:space-between}
.header-logo{font-family:var(--font-display);font-size:1.1rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase}
.nav-toggle{position:absolute;left:50%;transform:translateX(-50%);display:flex;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:100px;overflow:hidden}
.nav-toggle a{padding:5px 14px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;color:var(--text-muted);transition:all .15s}
.nav-toggle a.active{background:var(--text-primary);color:var(--bg);font-weight:500}
.header-stats{display:flex;gap:10px;align-items:center}
.stat-dot{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted)}
.stat-dot::before{content:'';width:6px;height:6px;border-radius:50%}
.stat-dot.green::before{background:var(--green)}.stat-dot.yellow::before{background:var(--yellow)}.stat-dot.red::before{background:var(--red)}
.header-progress{font-size:11px;color:var(--text-muted)}
#card-area{flex:1;display:none;position:relative;overflow:hidden}
#card-area.visible{display:block}
.card-stack{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:0 16px calc(env(safe-area-inset-bottom,0px) + 16px)}
.recipe-card{position:absolute;width:100%;max-width:400px;border-radius:20px;overflow:hidden;background:var(--surface);border:1px solid var(--border);cursor:grab;touch-action:none;will-change:transform}
.recipe-card:active{cursor:grabbing}
.recipe-card.back-1{transform:scale(.95) translateY(16px);z-index:1;pointer-events:none}
.recipe-card.back-2{transform:scale(.90) translateY(32px);z-index:0;pointer-events:none}
.recipe-card.top{z-index:2}
.card-img{width:100%;aspect-ratio:2/3;max-height:52dvh;object-fit:cover;display:block;background:var(--bg)}
.card-img-placeholder{width:100%;aspect-ratio:2/3;max-height:52dvh;background:linear-gradient(135deg,#1e1e1a,#2a2a24);display:flex;align-items:center;justify-content:center;font-size:3rem}
.card-body{padding:20px 20px 16px}
.card-cuisine{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;font-weight:500}
.card-name{font-family:var(--font-display);font-size:1.7rem;font-weight:500;line-height:1.15;color:var(--text-primary);margin-bottom:10px}
.card-desc{font-size:13px;color:var(--text-secondary);line-height:1.55;font-weight:300}
.card-source{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:6px;justify-content:space-between}
.card-source a{color:var(--text-muted);text-decoration:none}
.swipe-label{position:absolute;font-family:var(--font-display);font-size:2rem;font-weight:600;font-style:italic;letter-spacing:.05em;text-transform:uppercase;opacity:0;pointer-events:none;border:3px solid currentColor;padding:4px 14px;border-radius:6px}
.label-yes{top:20px;left:20px;color:var(--green)}.label-no{top:20px;right:20px;color:var(--red)}.label-maybe{left:50%;transform:translateX(-50%);bottom:20px;color:var(--yellow)}
#swipe-hint{position:absolute;bottom:24px;left:0;right:0;text-align:center;font-size:11px;color:var(--text-muted);letter-spacing:.08em;pointer-events:none;animation:fadeHint 3s ease forwards;animation-delay:1.5s}
@keyframes fadeHint{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
#done-screen{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:2rem;z-index:50;background:var(--bg)}
#done-screen.visible{display:flex}
.done-title{font-family:var(--font-display);font-size:2.5rem;font-weight:500;font-style:italic}
.done-subtitle{font-size:13px;color:var(--text-secondary)}
.done-stats{display:flex;gap:28px;margin-top:8px}
.done-stat{text-align:center}
.done-num{font-family:var(--font-display);font-size:2.5rem;font-weight:500;display:block}
.done-label{font-size:10px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase}
.done-stat.green .done-num{color:var(--green)}.done-stat.yellow .done-num{color:var(--yellow)}.done-stat.red .done-num{color:var(--red)}
.done-note{font-size:11px;color:var(--text-muted);text-align:center;max-width:240px;line-height:1.6}
.done-actions{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:8px;width:100%;max-width:260px}
.export-btn{width:100%;background:var(--green-glow);border:1.5px solid var(--green);border-radius:100px;padding:12px 24px;color:var(--green);font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer}
.reset-btn{width:100%;background:none;border:1px solid var(--border);border-radius:100px;padding:10px 24px;color:var(--text-secondary);font-family:var(--font-body);font-size:13px;cursor:pointer}
#toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:8px 18px;font-size:12px;color:var(--text-secondary);opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:200}
#toast.show{opacity:1}
.exit-right{animation:exitRight .35s ease-in forwards}
.exit-left{animation:exitLeft .35s ease-in forwards}
.exit-up{animation:exitUp .35s ease-in forwards}
@keyframes exitRight{to{transform:translateX(130%) rotate(20deg);opacity:0}}
@keyframes exitLeft{to{transform:translateX(-130%) rotate(-20deg);opacity:0}}
@keyframes exitUp{to{transform:translateY(-130%) scale(.9);opacity:0}}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-logo">CKC</div>
  <div class="login-tagline">Recipe Review</div>
  <div class="login-form">
    <input class="login-input" id="login-user" type="text" placeholder="Username" autocomplete="username" />
    <input class="login-input" id="login-pass" type="password" placeholder="Password" autocomplete="current-password" />
    <button class="login-btn" id="login-btn">Sign in</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>
<div id="app">
  <div id="loading"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><div class="loading-text" id="loading-text">Loading recipes...</div></div>
  <div id="error-screen"><div class="error-title">Something went wrong</div><div class="error-msg" id="error-msg"></div><button class="error-btn" id="error-retry">Try again</button></div>
  <div id="header"><div class="header-stats"><div class="stat-dot green" id="stat-yes">0</div><div class="stat-dot yellow" id="stat-maybe">0</div><div class="stat-dot red" id="stat-no">0</div></div><div class="nav-toggle"><a href="/" class="active">Swipe</a><a href="/catalog">Catalog</a></div><div class="header-progress" id="progress"></div></div>
  <div id="card-area"><div class="card-stack" id="card-stack"></div><div id="swipe-hint">swipe right yes &nbsp;·&nbsp; left no &nbsp;·&nbsp; up maybe</div></div>
  <div id="done-screen">
    <div class="done-title">All done.</div>
    <p class="done-subtitle">Session complete.</p>
    <div class="done-stats">
      <div class="done-stat green"><span class="done-num" id="final-yes">0</span><span class="done-label">Yes</span></div>
      <div class="done-stat yellow"><span class="done-num" id="final-maybe">0</span><span class="done-label">Maybe</span></div>
      <div class="done-stat red"><span class="done-num" id="final-no">0</span><span class="done-label">No</span></div>
    </div>
    <p class="done-note">Decisions synced. Export CSV to import into your sheet.</p>
    <div class="done-actions">
      <button class="export-btn" id="export-btn">Download Decisions CSV</button>
      <button class="reset-btn"  id="reset-btn">Back to start</button>
    </div>
  </div>
  <div id="toast"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
// ── Firebase init ─────────────────────────────────────
firebase.initializeApp({
  apiKey:            'AIzaSyBoTyWKQZ3oaf4KjhDikxMOF7bfv5W7Z7U',
  authDomain:        'ckc-recipe-swipe.firebaseapp.com',
  projectId:         'ckc-recipe-swipe',
  storageBucket:     'ckc-recipe-swipe.firebasestorage.app',
  messagingSenderId: '217552239546',
  appId:             '1:217552239546:web:bfd4121d6dccbd694a7b83',
});
const db = firebase.firestore();

// ── State ─────────────────────────────────────────────
let recipes = [], currentIndex = 0, counts = {yes:0, maybe:0, no:0};
let animating = false, isDragging = false;
let startX = 0, startY = 0, currentX = 0, currentY = 0, topCard = null;

const $ = id => document.getElementById(id);

// ── localStorage fallback helpers ─────────────────────
const LS_REVIEWED  = 'ckc_reviewed';
const LS_POSITION  = 'ckc_position';
const LS_DECISIONS = 'ckc_decisions';

function lsGetReviewed(){try{return new Set(JSON.parse(localStorage.getItem(LS_REVIEWED)||'[]'));}catch(e){return new Set();}}
function lsAddReviewed(name){try{const s=lsGetReviewed();s.add(name);localStorage.setItem(LS_REVIEWED,JSON.stringify([...s]));}catch(e){}}
function lsSavePosition(name){try{localStorage.setItem(LS_POSITION,name);}catch(e){}}
function lsGetPosition(){try{return localStorage.getItem(LS_POSITION)||'';}catch(e){return '';}}
function lsSaveDecision(recipe,action){
  try{
    const all=JSON.parse(localStorage.getItem(LS_DECISIONS)||'[]');
    all.push({
      name:recipe.name, decision:action.toUpperCase(), url:recipe.url,
      blogger:recipe.blogger||'', alignmentScore:recipe.alignmentScore||null,
      mealType:recipe.course||'', cuisineStyle:recipe.cuisine||'',
      rating:recipe.rating||'', notes:recipe.description||'', image:recipe.image||'',
      decidedAt:new Date().toISOString(),
    });
    localStorage.setItem(LS_DECISIONS,JSON.stringify(all));
  }catch(e){}
}

// ── Firestore helpers ─────────────────────────────────
const progressRef = db.collection('progress').doc('state');

async function fsGetState(){
  try{
    const snap = await progressRef.get();
    if(snap.exists){
      const d = snap.data();
      return {reviewed: new Set(d.reviewed||[]), position: d.position||''};
    }
  }catch(e){}
  return {reviewed: new Set(), position: ''};
}

function fsWriteDecision(recipe, action){
  db.collection('decisions').add({
    name:           recipe.name,
    decision:       action.toUpperCase(),
    url:            recipe.url||'',
    blogger:        recipe.blogger||'',
    alignmentScore: recipe.alignmentScore||null,
    protein:        recipe.protein||null,
    mealType:       recipe.course||'',
    cuisineStyle:   recipe.cuisine||'',
    rating:         recipe.rating||'',
    notes:          recipe.description||'',
    image:          recipe.image||'',
    tags:           [],
    decidedAt:      firebase.firestore.FieldValue.serverTimestamp(),
  }).catch(()=>{});
}

function fsUpdateProgress(name){
  progressRef.set({
    position: name,
    reviewed: firebase.firestore.FieldValue.arrayUnion(name),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  }, {merge: true}).catch(()=>{});
}

// ── Load recipes ──────────────────────────────────────
let _allRecipes = [];  // full list kept for background reconcile

async function loadRecipes(){
  showLoading('Loading...');
  try{
    // 1. Fast path — recipes.json (browser-cached after first load) + localStorage
    const all = await fetch('recipes.json').then(r=>{
      if(!r.ok) throw new Error('recipes.json not found — run scrape.py first');
      return r.json();
    });
    _allRecipes = all;

    const lsReviewed = lsGetReviewed();
    const lsPosition = lsGetPosition();

    recipes = all.filter(r => r.name && !lsReviewed.has(r.name));
    if(!recipes.length){ showDone(); return; }

    if(lsPosition){
      const idx = recipes.findIndex(r => r.name === lsPosition);
      if(idx > 0) currentIndex = idx;
    }

    hideLoading();
    showMain();
    renderCards();
    preloadImages();

    // 2. Background — reconcile with Firestore without blocking cards
    fsGetState().then(fsState=>{
      const merged = new Set([...lsReviewed, ...fsState.reviewed]);
      if(merged.size === lsReviewed.size) return; // nothing new

      // Firestore knew about more reviewed recipes — update queue silently
      localStorage.setItem(LS_REVIEWED, JSON.stringify([...merged]));
      const newRecipes = _allRecipes.filter(r => r.name && !merged.has(r.name));

      // Only re-render if it changes what the user sees ahead
      const needsUpdate = newRecipes.length < recipes.length - currentIndex;
      recipes = newRecipes;

      // Advance past any newly-discovered reviewed items
      if(fsState.position){
        const idx = recipes.findIndex(r => r.name === fsState.position);
        if(idx > currentIndex) currentIndex = idx;
      }

      if(needsUpdate){ renderCards(); preloadImages(); }
    }).catch(()=>{});

  }catch(e){ showError(e.message); }
}

// ── Card rendering ────────────────────────────────────
function renderCards(){
  $('card-stack').innerHTML='';
  if(currentIndex>=recipes.length){showDone();return;}
  const slice=recipes.slice(currentIndex,currentIndex+3);
  [...slice].reverse().forEach((recipe,i)=>{
    const ri=slice.length-1-i;
    const card=buildCard(recipe);
    if(ri===0&&slice.length>=3) card.classList.add('back-2');
    else if(ri===0)             card.classList.add('back-1');
    else if(ri===1)             card.classList.add('back-1');
    else{card.classList.add('top');setupDrag(card);}
    $('card-stack').appendChild(card);
  });
  if(slice.length===1){const c=$('card-stack').querySelector('.recipe-card');c.className='recipe-card top';setupDrag(c);}
  topCard=$('card-stack').querySelector('.top');
  $('progress').textContent=(currentIndex+1)+' / '+recipes.length;
}

function preloadImages(){
  // Silently preload images for cards beyond the visible 3-card stack
  for(let i = currentIndex + 3; i < Math.min(currentIndex + 9, recipes.length); i++){
    if(recipes[i]?.image){ new Image().src = recipes[i].image; }
  }
}

function buildCard(r){
  const card=document.createElement('div');
  card.className='recipe-card';
  let domain='';try{domain=r.url?new URL(r.url).hostname.replace('www.',''):'';}catch(e){}
  card.innerHTML=`
    <div style="position:relative">
      ${r.image
        ? `<img class="card-img" src="${r.image}" alt="${escHtml(r.name)}" onerror="this.outerHTML='<div class=\\'card-img-placeholder\\'>🍽️</div>'">`
        : '<div class="card-img-placeholder">🍽️</div>'}
      <div class="swipe-label label-yes">Yes</div>
      <div class="swipe-label label-no">No</div>
      <div class="swipe-label label-maybe">Maybe</div>
    </div>
    <div class="card-body">
      <div class="card-cuisine">${escHtml(r.cuisine)}${r.course?' &middot; '+escHtml(r.course):''}</div>
      <div class="card-name">${escHtml(r.name)}</div>
      <div class="card-desc">${buildDesc(r)}</div>
      <div class="card-source">
        ${domain?`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg><a href="${escHtml(r.url)}" target="_blank">${escHtml(domain)}</a>`:''}
        ${isRatingCount(r.description) ? '' : formatRating(r.rating, '')}
      </div>
    </div>`;
  return card;
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function isRatingCount(s){ return /^\d[\d,]*\s+ratings?$/i.test(String(s||'').trim()); }

function buildDesc(r){
  const desc = r.description || '';
  // If description is just "X ratings", build a formatted rating line instead
  if(isRatingCount(desc)){
    const countM = desc.match(/(\d[\d,]*)/);
    const score  = parseFloat(r.rating);
    if(score && countM){
      return escHtml(`${score}/5 \u00b7 ${Number(countM[1].replace(/,/g,'')).toLocaleString()} ratings`);
    }
    return '';
  }
  return escHtml(desc);
}

function formatRating(raw, desc){
  if(!raw) return '';
  // Format: "4.9 (180 ratings)"
  const full = String(raw).match(/([\d.]+)\s*\((\d+)\s*ratings?\)/i);
  if(full) return `<span style="margin-left:auto">${full[1]}/5 &middot; ${Number(full[2]).toLocaleString()} ratings</span>`;
  // Format: score only "4.9", count may be in desc ("180 ratings")
  const score = parseFloat(raw);
  if(score){
    const countMatch = isRatingCount(desc) && String(desc).match(/(\d[\d,]*)/);
    const count = countMatch ? ` &middot; ${Number(countMatch[1].replace(/,/g,'')).toLocaleString()} ratings` : '';
    return `<span style="margin-left:auto">${score}/5${count}</span>`;
  }
  return '';
}

// ── Drag / swipe ──────────────────────────────────────
function setupDrag(card){card.addEventListener('mousedown',onStart);card.addEventListener('touchstart',onStart,{passive:true});}
function onStart(e){
  if(animating)return;isDragging=true;
  const pt=e.touches?e.touches[0]:e;startX=pt.clientX;startY=pt.clientY;currentX=0;currentY=0;
  topCard=e.currentTarget;topCard.style.transition='none';
  document.addEventListener('mousemove',onMove);document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('mouseup',onEnd);document.addEventListener('touchend',onEnd);
}
function onMove(e){
  if(!isDragging)return;if(e.cancelable)e.preventDefault();
  const pt=e.touches?e.touches[0]:e;currentX=pt.clientX-startX;currentY=pt.clientY-startY;
  topCard.style.transform='translateX('+currentX+'px) translateY('+currentY+'px) rotate('+(currentX*0.06)+'deg)';
  const absX=Math.abs(currentX),absY=Math.abs(currentY),t=40;
  const ly=topCard.querySelector('.label-yes'),ln=topCard.querySelector('.label-no'),lm=topCard.querySelector('.label-maybe');
  if(currentY<-t&&absY>absX){lm.style.opacity=Math.min((-currentY-t)/60,1);ly.style.opacity=0;ln.style.opacity=0;}
  else if(currentX>t){ly.style.opacity=Math.min((currentX-t)/60,1);ln.style.opacity=0;lm.style.opacity=0;}
  else if(currentX<-t){ln.style.opacity=Math.min((-currentX-t)/60,1);ly.style.opacity=0;lm.style.opacity=0;}
  else{ly.style.opacity=0;ln.style.opacity=0;lm.style.opacity=0;}
}
function onEnd(){
  if(!isDragging)return;isDragging=false;
  document.removeEventListener('mousemove',onMove);document.removeEventListener('touchmove',onMove);
  document.removeEventListener('mouseup',onEnd);document.removeEventListener('touchend',onEnd);
  const absX=Math.abs(currentX),absY=Math.abs(currentY),t=80;
  if(currentY<-t&&absY>absX)      decide('maybe');
  else if(currentX>t)             decide('yes');
  else if(currentX<-t)            decide('no');
  else{
    topCard.style.transition='transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275)';
    topCard.style.transform='';
    topCard.querySelectorAll('.swipe-label').forEach(l=>l.style.opacity=0);
  }
  currentX=0;currentY=0;
}

// ── Decision ──────────────────────────────────────────
function decide(action){
  if(animating||currentIndex>=recipes.length)return;
  animating=true;
  const recipe=recipes[currentIndex];
  counts[action]++;
  $('stat-yes').textContent=counts.yes;$('stat-maybe').textContent=counts.maybe;$('stat-no').textContent=counts.no;
  const card=$('card-stack').querySelector('.top');
  if(card){
    card.style.transition='none';
    card.classList.add(action==='yes'?'exit-right':action==='no'?'exit-left':'exit-up');
    card.addEventListener('animationend',()=>{currentIndex++;animating=false;renderCards();preloadImages();},{once:true});
  }
  showToast(action==='yes'?'Yes ✓':action==='maybe'?'Maybe':'No');

  // Write to both localStorage and Firestore
  lsAddReviewed(recipe.name);
  lsSavePosition(recipe.name);
  lsSaveDecision(recipe, action);
  fsWriteDecision(recipe, action);
  fsUpdateProgress(recipe.name);
}

// ── Export CSV ────────────────────────────────────────
function exportCSV(){
  try{
    const decisions=JSON.parse(localStorage.getItem(LS_DECISIONS)||'[]');
    if(!decisions.length){showToast('No decisions yet');return;}
    const header=['Recipe Name','Decision','Cuisine','Course','URL','Timestamp'];
    const rows=decisions.map(d=>[d.name,d.decision,d.cuisine,d.course,d.url,d.timestamp].map(v=>'"'+(v||'').replace(/"/g,'""')+'"').join(','));
    const csv=[header.join(','),...rows].join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='ckc-decisions-'+new Date().toISOString().slice(0,10)+'.csv';
    a.click();
  }catch(e){showToast('Export failed');}
}

// ── UI helpers ────────────────────────────────────────
function showMain(){$('header').classList.add('visible');$('card-area').classList.add('visible');}
function hideMain(){$('header').classList.remove('visible');$('card-area').classList.remove('visible');}
function showLoading(t){$('loading-text').textContent=t||'Loading...';$('loading').style.display='flex';}
function hideLoading(){$('loading').style.display='none';}
function showError(msg){hideLoading();$('error-msg').textContent=msg;$('error-screen').style.display='flex';}
function showDone(){
  hideMain();
  $('final-yes').textContent=counts.yes;$('final-maybe').textContent=counts.maybe;$('final-no').textContent=counts.no;
  $('done-screen').classList.add('visible');
}
let toastTimer;
function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1400);}

// ── Button listeners ──────────────────────────────────
$('export-btn').addEventListener('click',exportCSV);
$('error-retry').addEventListener('click',()=>{$('error-screen').style.display='none';loadRecipes();});
$('reset-btn').addEventListener('click',()=>{
  currentIndex=0;counts={yes:0,maybe:0,no:0};
  $('done-screen').classList.remove('visible');
  loadRecipes();
});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') decide('yes');
  if(e.key==='ArrowLeft')  decide('no');
  if(e.key==='ArrowUp')    decide('maybe');
});

// ── PWA manifest ──────────────────────────────────────
const _m={name:'CKC Recipe Review',short_name:'CKC',display:'standalone',background_color:'#0f0f0d',theme_color:'#0f0f0d',orientation:'portrait'};
const _b=new Blob([JSON.stringify(_m)],{type:'application/json'});const _l=document.createElement('link');_l.rel='manifest';_l.href=URL.createObjectURL(_b);document.head.appendChild(_l);

// ── Login ─────────────────────────────────────────────
const LOGIN_KEY = 'ckc_auth';
function checkLogin(){
  if(localStorage.getItem(LOGIN_KEY)==='1'){
    document.getElementById('login-screen').style.display='none';
    loadRecipes();
  }
}
document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('login-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
function doLogin(){
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  if(u==='admin' && p==='prince'){
    localStorage.setItem(LOGIN_KEY,'1');
    document.getElementById('login-screen').style.display='none';
    loadRecipes();
  } else {
    document.getElementById('login-error').textContent='Incorrect username or password';
    document.getElementById('login-pass').value='';
  }
}

// ── Start ─────────────────────────────────────────────
checkLogin();
</script>
